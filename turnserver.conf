# coturn configuration for private video call

listening-port=3478
tls-listening-port=5349

# Replace with your public IP when deploying to VPS
# listening-ip=YOUR_PUBLIC_IP

# Credentials (must match room.html iceServers config)
user=videocall:secret123

# Realm
realm=videocall.local

# Logging
log-file=/var/log/coturn/turnserver.log
simple-log

# Security
no-multicast-peers
no-cli
fingerprint
lt-cred-mech
