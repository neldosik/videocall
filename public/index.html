<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Видеозвонок</title>
  <link rel="manifest" href="/manifest.json">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="Звонок">
  <link rel="apple-touch-icon" href="/icon-192.png">
  <meta name="theme-color" content="#6c63ff">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100dvh;
      background: #0f0f13;
      color: #f0f0f5;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    /* Ambient glow */
    body::before {
      content: '';
      position: fixed;
      top: -30%;
      left: 50%;
      transform: translateX(-50%);
      width: 600px;
      height: 600px;
      background: radial-gradient(circle, rgba(108,99,255,0.18) 0%, transparent 70%);
      pointer-events: none;
    }

    .logo {
      width: 56px;
      height: 56px;
      background: linear-gradient(135deg, #6c63ff, #48cfad);
      border-radius: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      margin-bottom: 20px;
      box-shadow: 0 8px 32px rgba(108,99,255,0.35);
    }

    h1 {
      font-size: 1.9rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 6px;
      background: linear-gradient(135deg, #fff 40%, #a09fff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .sub {
      color: #6b6b80;
      font-size: 0.9rem;
      margin-bottom: 40px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      padding: 32px 28px;
      width: 100%;
      max-width: 380px;
      backdrop-filter: blur(12px);
    }

    .btn-create {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, #6c63ff, #8b5cf6);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.15s;
      box-shadow: 0 4px 20px rgba(108,99,255,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .btn-create:active { transform: scale(0.97); }
    .btn-create:hover { box-shadow: 0 6px 28px rgba(108,99,255,0.55); }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: #3a3a4a;
      font-size: 0.8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(255,255,255,0.07);
    }

    .join-row {
      display: flex;
      gap: 8px;
    }
    .join-row input {
      flex: 1;
      padding: 13px 14px;
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 12px;
      color: #f0f0f5;
      font-size: 0.95rem;
      outline: none;
      transition: border-color 0.2s;
      letter-spacing: 1px;
    }
    .join-row input::placeholder { color: #4a4a60; letter-spacing: 0; }
    .join-row input:focus { border-color: #6c63ff; }

    .btn-join {
      padding: 13px 18px;
      background: rgba(108,99,255,0.15);
      border: 1px solid rgba(108,99,255,0.3);
      color: #9d97ff;
      border-radius: 12px;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: background 0.2s;
    }
    .btn-join:hover { background: rgba(108,99,255,0.25); }

    .error { color: #ff6b6b; font-size: 0.82rem; margin-top: 10px; min-height: 18px; text-align: center; }

    .features {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 28px;
    }
    .feat {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      color: #4a4a60;
      font-size: 0.72rem;
    }
    .feat-icon { font-size: 1.3rem; }
  </style>
</head>
<body>
  <div class="logo">📹</div>
  <h1>Видеозвонок</h1>
  <p class="sub">Приватный. Без регистрации. Бесплатно.</p>

  <div class="card">
    <button class="btn-create" id="createBtn">
      <span>✦</span> Создать комнату
    </button>

    <div class="divider">или войти по коду</div>

    <div class="join-row">
      <input type="text" id="roomInput" placeholder="Код комнаты" maxlength="12" autocomplete="off" autocapitalize="none">
      <button class="btn-join" id="joinBtn">Войти</button>
    </div>
    <div class="error" id="errorMsg"></div>
  </div>

  <div class="features">
    <div class="feat"><span class="feat-icon">🔒</span>Зашифровано</div>
    <div class="feat"><span class="feat-icon">👥</span>Группа</div>
    <div class="feat"><span class="feat-icon">⚡</span>Быстро</div>
  </div>

  <script>
    if ('serviceWorker' in navigator) navigator.serviceWorker.register('/sw.js');

    document.getElementById('createBtn').addEventListener('click', () => {
      window.location.href = '/room/' + Math.random().toString(36).slice(2, 10);
    });

    document.getElementById('joinBtn').addEventListener('click', () => {
      const code = document.getElementById('roomInput').value.trim().toLowerCase();
      if (!code) { document.getElementById('errorMsg').textContent = 'Введите код комнаты'; return; }
      window.location.href = '/room/' + code;
    });

    document.getElementById('roomInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') document.getElementById('joinBtn').click();
    });
  </script>
</body>
</html>
